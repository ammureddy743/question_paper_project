<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QTrans: Multilingual Exam Translation</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9fafb;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #ff6f00, #138808, #0288d1);
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            max-width: 1200px;
            margin: auto;
        }

        .navbar h1 {
            margin: 0;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar h1::before {
            content: "📚";
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 15px;
            margin: 0;
        }

        .navbar ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .navbar ul li a:hover {
            background-color: rgba(255,255,255,0.2);
        }

        .hero-text {
            text-align: center;
            padding: 15px;
            font-style: italic;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            flex: 1;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #0288d1, #138808);
            color: white;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="navbar">
        <h1>QTrans</h1>

        <ul>
            <!-- ✅ FIXED LINKS -->
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'UserLogin' %}">User Login</a></li>
            <li><a href="{% url 'UserRegister' %}">Register</a></li>
            <li><a href="{% url 'AdminLogin' %}">Admin</a></li>
        </ul>
    </div>

    <div class="hero-text">
        QTrans helps translate exam questions into Indian languages quickly and easily.
    </div>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <p>© 2026 QTrans | All Rights Reserved</p>
</footer>

</body>
</html>
