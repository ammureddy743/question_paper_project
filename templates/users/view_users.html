{% if users %}
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Login ID</th>
            <th>Status</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.loginid }}</td>
            <td>{{ user.status }}</td>
        </tr>
        {% endfor %}
    </table>
{% else %}
    <p>No users found</p>
{% endif %}
