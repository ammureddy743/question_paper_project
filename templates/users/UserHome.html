{% extends 'users/Userbase.html' %}

{% block content %}

<style>
    .user-home-box {
        background-color: white;
        padding: 2rem;
        margin-top: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    .user-home-box h2 {
        color: #1e3a8a;
        font-size: 2rem;
        margin-bottom: 1rem;
    }

    .user-home-box p {
        font-size: 1.1rem;
        color: #4b5563;
        margin-bottom: 2rem;
    }

    .card-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
    }

    .card {
        padding: 20px;
        background: #f5f5f5;
        border-radius: 10px;
        width: 200px;
        transition: 0.3s;
    }

    .card:hover {
        background: #e0e7ff;
        transform: scale(1.05);
    }

    .card h3 {
        margin-bottom: 10px;
        color: #1e3a8a;
    }

    .card a {
        text-decoration: none;
        font-weight: bold;
        color: #3b82f6;
    }

    .card a:hover {
        color: #1e3a8a;
    }

    @media (max-width: 600px) {
        .card {
            width: 100%;
        }
    }
</style>

<div class="user-home-box">
    <h2>👋 Welcome, {{ request.session.loggeduser }}</h2>

    <p>
        Built for simplicity, QTrans transforms your English exam questions 
        into regional languages instantly and accurately.
    </p>

    <div class="card-container">

        <div class="card">
            <h3>📄 Translate</h3>
            <a href="{% url 'Translate' %}">Go</a>
        </div>

        <div class="card">
            <h3>📜 History</h3>
            <a href="{% url 'history' %}">View</a>
        </div>

        <div class="card">
            <h3>🚪 Logout</h3>
            <a href="{% url 'logout' %}">Logout</a>
        </div>

    </div>
</div>

{% endblock %}
