<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - QTrans Exam Translator</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7fa;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }
        .navbar h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }
        .navbar ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 1.5rem;
        }
        .navbar ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        .navbar ul li a:hover {
            background-color: #cbd5e1;
            color: #1e3a8a;
        }
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        footer {
            text-align: center;
            padding: 1rem 0;
            background-color: #1e3a8a;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        footer p {
            margin: 0;
            font-size: 0.9rem;
        }
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
            }
            .navbar ul {
                flex-direction: column;
                gap: 0.75rem;
                margin-top: 1rem;
            }
            .navbar h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <h1>QTrans Dashboard</h1>
            <ul>
                <li><a href="{% url 'UserHome' %}">Home</a></li>
                <li><a href="{% url 'Translate' %}">Translate</a></li>
                <li><a href="{% url 'logout' %}">Logout</a></li>
            </ul>
        </div>
    </header>

    <div class="container">
        {% block content %}
        <!-- User content goes here -->
        {% endblock %}
    </div>

   
</body>
</html>
